name: CI / registercenter-consul

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'registercenter/consul/**'
      - '.github/workflows/ci-registercenter-consul.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: registercenter/consul
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: registercenter/consul/go.sum

      - name: Test with race detector
        run: go test -race -coverprofile=coverage.txt -timeout=120s -run 'Test[^C]' .

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: registercenter/consul/coverage.txt
          flags: registercenter-consul
          name: registercenter-consul
          fail_ci_if_error: false
          verbose: true
