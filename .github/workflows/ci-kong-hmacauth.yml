name: CI / kong-hmacauth

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'kong/hmacauth/**'
      - '.github/workflows/ci-kong-hmacauth.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kong/hmacauth
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: kong/hmacauth/go.sum

      - name: Test with race detector
        run: go test -race -coverprofile=coverage.txt -timeout=60s .

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: kong/hmacauth/coverage.txt
          flags: kong-hmacauth
          name: kong-hmacauth
          fail_ci_if_error: false
          verbose: true
