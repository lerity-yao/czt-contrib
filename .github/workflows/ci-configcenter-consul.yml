name: CI / configcenter/consul

on:
  push:
    branches: [main]
    paths:
      - 'configcenter/consul/**'
      - '.github/workflows/ci-configcenter-consul.yml'
  pull_request:
    branches: [main]
    paths:
      - 'configcenter/consul/**'
      - '.github/workflows/ci-configcenter-consul.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: configcenter/consul
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: configcenter/consul/go.sum

      - name: Build
        run: go build ./...

      - name: Test with race detector
        run: go test -race -coverprofile=coverage.txt ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: configcenter/consul/coverage.txt
          flags: configcenter-consul
          name: configcenter-consul
          fail_ci_if_error: false
          verbose: true
