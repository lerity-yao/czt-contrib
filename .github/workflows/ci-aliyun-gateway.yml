name: CI / aliyun/gateway

on:
  push:
    branches: [main]
    paths:
      - 'aliyun/gateway/**'
      - '.github/workflows/ci-aliyun-gateway.yml'
  pull_request:
    branches: [main]
    paths:
      - 'aliyun/gateway/**'
      - '.github/workflows/ci-aliyun-gateway.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aliyun/gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: aliyun/gateway/go.sum

      - name: Build
        run: go build ./...

      - name: Test with race detector
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: aliyun/gateway/coverage.out
          flags: aliyun-gateway
          name: aliyun-gateway
          fail_ci_if_error: false
          verbose: true
